<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Grative - OSC</title>
</head>
<body>
    <header class="container-fluid d-flex align-items-center justify-content-between py-3 border-bottom">
        <select class="form-select form-select-sm w-auto fw-bold border-secondary-subtle text-secondary">
            <option value="1" selected>Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
        </select>
        <button class="btn btn-outline" data-bs-toggle="offcanvas" data-bs-target="#offcanvas-perfil" aria-controls="offcanvas-perfil">
            <i class="bi bi-person-circle fs-3"></i> <!--Adicionar foto de perfil da OSC no Sprint 2-->
        </button>
    </header>
    <main>
        <section class="container-fluid mt-4">
            <h1>Atalhos</h1>
            <div class="bg-white rounded-4 shadow-sm p-4 d-flex align-items-center gap-4">
                <a href="/relatorio-doacoes" class="btn btn-outline p-4 rounded-3 d-flex flex-column align-items-center border-black shadow-sm">
                    <i class="bi bi-file-earmark-text-fill fs-3"></i>
                    Novo Relatório
                </a>
                <a href="/relatorio-doacoes" class="btn btn-outline p-4 rounded-3 d-flex flex-column align-items-center border-black shadow-sm">
                    <i class="bi bi-file-earmark-text-fill fs-3"></i>
                    Novo Relatório
                </a>
                <a href="/relatorio-doacoes" class="btn btn-outline p-4 rounded-3 d-flex flex-column align-items-center border-black shadow-sm">
                    <i class="bi bi-file-earmark-text-fill fs-3"></i>
                    Novo Relatório
                </a>
                <a href="/relatorio-doacoes" class="btn btn-outline p-4 rounded-3 d-flex flex-column align-items-center border-black shadow-sm">
                    <i class="bi bi-file-earmark-text-fill fs-3"></i>
                    Novo Relatório
                </a>
            </div>
        </section>
        <section class="container-fluid mt-5"> 
            <h1 class="mb-4">Dashboard</h1>
            <div class="row g-4">
                <div class="col-md-6">
                    <div style="height: 200px;" class="bg-body-secondary rounded-4"></div>
                </div>
                <div class="col-md-6">
                    <div style="height: 200px;" class="bg-body-secondary rounded-4"></div>
                </div>
                <div class="col-md-6">
                    <div style="height: 200px;" class="bg-body-secondary rounded-4"></div>
                </div>
                <div class="col-md-6">
                    <div style="height: 200px;" class="bg-body-secondary rounded-4"></div>
                </div>
            </div>
        </section>
    </main>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvas-perfil" aria-labelledby="offcanvas-perfil">
        <div class="offcanvas-header">
            <h2 class="offcanvas-title" id="offcanvas-perfil">Seu Perfil</h2>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column pt-0">
            <div class="text-center">
                <i style="font-size: 180px;" class="bi bi-person-circle lh-1"></i> <!--Adicionar foto de perfil da Osc no sprint 2-->
            </div>
            <div>
                <button class="btn btn-outline-primary w-100 mt-3">Editar Perfil</button>
                <button class="btn btn-outline-danger w-100 mt-3">Excluir Perfil</button>
            </div>
            <div class="mt-auto">
                <button class="btn d-flex align-items-center gap-2">
                    <i class="bi bi-box-arrow-right fs-3"></i>
                    Sair da conta
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
