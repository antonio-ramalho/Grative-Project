<!doctype html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Cadastro de Doador</title>
	<style>
		body { font-family: Arial, sans-serif; background:#f7f7f7; margin:0; padding:20px; }
		main { max-width:480px; margin:40px auto; background:#fff; padding:24px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
		h1 { margin-top:0; font-size:1.25rem; }
		.form-row { margin-bottom:12px; }
		label { display:block; font-size:0.9rem; margin-bottom:6px; }
		input { width:100%; padding:8px 10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box; }
		button { display:inline-block; padding:10px 14px; border:none; background:#0078d4; color:#fff; border-radius:4px; cursor:pointer; }
		button:disabled { opacity:.6; cursor:not-allowed; }
		#formMessage { margin-top:12px; font-size:0.95rem; }
	</style>
</head>
<body>
	<main>
		<h1>Crie sua conta</h1>
		<form id="cadastroDoadorForm" method="post" action="/register">
			<div class="form-row">
				<label for="name">Nome completo</label>
				<input type="text" id="name" name="name" required autocomplete="name">
			</div>
			<div class="form-row">
				<label for="email">E‑mail</label>
				<input type="email" id="email" name="email" required autocomplete="email">
			</div>
			<div class="form-row">
				<label for="password">Senha</label>
				<input type="password" id="password" name="password" required minlength="6" autocomplete="new-password">
			</div>
			<div class="form-row">
				<label for="confirm_password">Confirmar senha</label>
				<input type="password" id="confirm_password" name="confirm_password" required minlength="6" autocomplete="new-password">
			</div>
			<div class="form-row">
				<label for="phone">Telefone (opcional)</label>
				<input type="tel" id="phone" name="phone" autocomplete="tel">
			</div>
			<div class="form-row">
				<button type="submit">Cadastrar</button>
			</div>
		</form>
		<div id="formMessage" role="status" aria-live="polite"></div>
	</main>

	<!-- Link to page-specific JS (served from public/js) -->
	<script src="/js/cadastro_doador.js"></script>
</body>
</html>
